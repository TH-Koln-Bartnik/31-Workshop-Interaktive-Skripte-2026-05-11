<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Beispiel-Quiz</title>
<style>
  body { font-family: Arial, sans-serif; color: #111; max-width: 720px; margin: 1.5rem auto; padding: 0 1rem; line-height: 1.55; }
  h1 { font-size: 1.3rem; }
  .frage { background: #f5f5f7; border-left: 4px solid #b43092; padding: 1rem 1.25rem; margin: 1rem 0; }
  .antwort { display: block; margin: 0.4rem 0; cursor: pointer; }
  button { background: #c81e0f; color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; }
  button:hover { background: #b43092; }
  .feedback { margin-top: 0.8rem; font-weight: 600; min-height: 1.4em; }
  .ok { color: #2d8c2d; }
  .nok { color: #c81e0f; }
</style>
</head>
<body>
<h1>Beispiel-Quiz: Welche Lernaktivität wirkt am stärksten?</h1>
<div class="frage" id="q1">
  <p><strong>Welche der folgenden Aktivitäten verbessert das Behalten am stärksten?</strong></p>
  <label class="antwort"><input type="radio" name="q1a" value="a"> Wiederholtes Lesen</label>
  <label class="antwort"><input type="radio" name="q1a" value="b"> Markieren mit Textmarker</label>
  <label class="antwort"><input type="radio" name="q1a" value="c"> Aus dem Gedächtnis aufschreiben</label>
  <button onclick="check()">Antwort prüfen</button>
  <div class="feedback" id="fb"></div>
</div>
<script>
  function check() {
    const sel = document.querySelector('input[name="q1a"]:checked');
    const fb = document.getElementById('fb');
    if (!sel) { fb.textContent = 'Bitte eine Antwort auswählen.'; fb.className = 'feedback nok'; return; }
    if (sel.value === 'c') { fb.textContent = 'Richtig — Karpicke & Blunt (2011) zeigen den starken Effekt von Retrieval Practice.'; fb.className = 'feedback ok'; }
    else { fb.textContent = 'Nicht ganz. Antwort C wäre richtig.'; fb.className = 'feedback nok'; }
  }
</script>
</body>
</html>
